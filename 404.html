<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 — Page Not Found | Anurag Chauhan</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #111113;
            --border: #1e1e22;
            --text: #f4f4f5;
            --muted: #a1a1aa;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .box {
            max-width: 420px;
            width: 100%;
            background: linear-gradient(180deg, #141417, #0e0e10);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .code {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -2px;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        a.btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }
        a.btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Head back to the portfolio to continue browsing.</p>
        <a class="btn" href="/">Back to portfolio</a>
    </div>
</body>
</html>
